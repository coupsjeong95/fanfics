<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿 · Coupsjeong fanfics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ======== Header ======== -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div>
          <div class="header-eyebrow">
            <a href="index.html" style="color:var(--text-3);letter-spacing:0.05em;">← 返回合集</a>
          </div>
          <h1 class="site-title">Coupsjeong <em>投稿</em></h1>
        </div>
      </div>
    </div>
  </header>

  <!-- ======== Main ======== -->
  <main>
    <div class="container">
      <div class="form-wrap">

        <div class="notice-box">
          投稿为匿名提交，内容经管理员审核通过后展示在合集主页。<br>
          请确保所填信息准确，链接可正常访问。<br>
          <strong style="font-weight:400;color:var(--rose);">不接受 SVT 群像及澈汉为副 CP 相关投稿。</strong>
        </div>

        <form id="submitForm" novalidate>

          <!-- Form title row with submit button -->
          <div class="form-title-row">
            <span class="form-section-title">填写投稿信息</span>
            <button type="submit" class="btn-submit" id="submitBtn">提交投稿</button>
          </div>

          <!-- 文名 -->
          <div class="f-group">
            <label class="f-label" for="fTitle">
              文名 <span class="req">*</span>
              <span class="f-hint">不超过 10 中文 / 20 英文字符</span>
              <span class="f-counter" id="titleCounter">0 / 20</span>
            </label>
            <input class="f-input" type="text" id="fTitle" placeholder="请输入文章标题" autocomplete="off">
          </div>

          <!-- 作者 -->
          <div class="f-group">
            <label class="f-label" for="fAuthor">
              作者 <span class="req">*</span>
              <span class="f-hint">可输入匿名</span>
            </label>
            <input class="f-input" type="text" id="fAuthor" placeholder="请输入作者笔名" autocomplete="off">
          </div>

          <!-- 链接 -->
          <div class="f-group">
            <label class="f-label" for="fLink">链接 <span class="req">*</span></label>
            <input class="f-input" type="url" id="fLink" placeholder="https://...">
          </div>

          <!-- 阅读平台 -->
          <div class="f-group">
            <label class="f-label">阅读平台 <span class="req">*</span></label>
            <div class="choice-row">
              <label class="choice-opt">
                <input type="radio" name="platform" value="ao3">
                <span class="choice-face">AO3</span>
              </label>
              <label class="choice-opt">
                <input type="radio" name="platform" value="aff">
                <span class="choice-face">AFF</span>
              </label>
              <label class="choice-opt">
                <input type="radio" name="platform" value="lofter">
                <span class="choice-face">Lofter</span>
              </label>
              <label class="choice-opt">
                <input type="radio" name="platform" value="微博">
                <span class="choice-face">微博</span>
              </label>
              <label class="choice-opt">
                <input type="radio" name="platform" value="其他">
                <span class="choice-face">其他</span>
              </label>
            </div>
          </div>

          <!-- 简介 -->
          <div class="f-group">
            <label class="f-label" for="fSummary">
              一句话简介 <span class="req">*</span>
              <span class="f-hint">不超过 25 字</span>
              <span class="f-counter" id="summaryCounter">0 / 25</span>
            </label>
            <textarea class="f-textarea" id="fSummary" placeholder="用一句话介绍这篇文…"></textarea>
          </div>

          <div class="f-divider"></div>

          <!-- 必选标签 -->
          <div class="f-group">
            <label class="f-label">时代 <span class="req">*</span></label>
            <div class="choice-row">
              <label class="choice-opt"><input type="radio" name="era" value="现代"><span class="choice-face">现代</span></label>
              <label class="choice-opt"><input type="radio" name="era" value="古代"><span class="choice-face">古代</span></label>
              <label class="choice-opt"><input type="radio" name="era" value="未来世界"><span class="choice-face">未来世界</span></label>
              <label class="choice-opt"><input type="radio" name="era" value="架空"><span class="choice-face">架空</span></label>
            </div>
          </div>

          <div class="f-group">
            <label class="f-label">进度 <span class="req">*</span></label>
            <div class="choice-row">
              <label class="choice-opt"><input type="radio" name="progress" value="完结"><span class="choice-face">完结</span></label>
              <label class="choice-opt"><input type="radio" name="progress" value="连载"><span class="choice-face">连载</span></label>
              <label class="choice-opt"><input type="radio" name="progress" value="暂停"><span class="choice-face">暂停</span></label>
            </div>
          </div>

          <div class="f-group">
            <label class="f-label">篇幅 <span class="req">*</span></label>
            <div class="choice-row">
              <label class="choice-opt">
                <input type="radio" name="length" value="短篇">
                <span class="choice-face">短篇<span class="choice-hint">3万字以下</span></span>
              </label>
              <label class="choice-opt">
                <input type="radio" name="length" value="中篇">
                <span class="choice-face">中篇<span class="choice-hint">3–10万字</span></span>
              </label>
              <label class="choice-opt">
                <input type="radio" name="length" value="长篇">
                <span class="choice-face">长篇<span class="choice-hint">10万字以上</span></span>
              </label>
            </div>
          </div>

          <div class="f-group">
            <label class="f-label">结局 <span class="req">*</span></label>
            <div class="choice-row">
              <label class="choice-opt"><input type="radio" name="ending" value="HE"><span class="choice-face">HE</span></label>
              <label class="choice-opt"><input type="radio" name="ending" value="BE"><span class="choice-face">BE</span></label>
              <label class="choice-opt"><input type="radio" name="ending" value="OE"><span class="choice-face">OE</span></label>
            </div>
          </div>

          <div class="f-divider"></div>

          <!-- 附加标签 -->
          <div class="f-group">
            <div class="tags-header">
              <span class="f-label" style="margin:0;">附加标签</span>
              <span class="f-hint">最多选 3 个</span>
              <span class="f-counter" id="tagsCounter">0 / 3</span>
            </div>
            <div class="tags-grid" id="extraTagsGrid"></div>
          </div>

        </form>
      </div>
    </div>
  </main>

  <!-- ======== Footer ======== -->
  <footer class="site-footer">
    Coupsjeong fanfics &ensp;·&ensp; 投稿经审核后展示
  </footer>

  <!-- Back to top -->
  <button class="btn-top" id="topBtn" aria-label="返回顶部">↑</button>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="submit.js"></script>
</body>
</html>
